openapi: 3.0.3
info:
  title: BondGov Emma investor document twin
  version: "1.0.0"
  description: >
    Compact OpenAPI twin for BondGov investor-document endpoints, backed by the
    local EMMA sample PDFs in ../outcomes/emma/samples from the twinning repo root.
servers:
  - url: https://bondgov.com
components:
  securitySchemes:
    BondGovApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: BondGov API key
  schemas:
    BondGovApiAuthStatusResponse:
      type: object
      required: [schema, authenticated, client, key, quotas]
      properties:
        schema: { type: object, additionalProperties: true }
        authenticated: { type: boolean }
        client: { type: object, additionalProperties: true }
        key: { type: object, additionalProperties: true }
        quotas: { type: object, additionalProperties: true }
    BondGovDoclistResponse:
      type: object
      required: [schema, query, security, groups, documents, counts, pagination]
      properties:
        schema: { type: object, additionalProperties: true }
        query: { type: object, additionalProperties: true }
        security: { type: object, additionalProperties: true }
        groups: { type: object, additionalProperties: true }
        documents:
          type: array
          items:
            $ref: "#/components/schemas/BondGovInvestorDocument"
        counts:
          type: object
          additionalProperties: { type: integer }
        pagination: { type: object, additionalProperties: true }
    BondGovInvestorDocument:
      type: object
      required:
        - document_id
        - title
        - category
        - source_system
        - source_type
        - scopes
        - issuer
        - posting_date
        - dated_date
        - cache_status
        - links
      properties:
        document_id: { type: string }
        title: { type: string }
        category: { type: string }
        source_system: { type: string }
        source_type: { type: string }
        scopes:
          type: array
          items: { type: string }
        issuer: { type: object, additionalProperties: true }
        reporting_entity:
          type: object
          nullable: true
          additionalProperties: true
        posting_date: { type: string }
        dated_date: { type: string }
        cache_status: { type: string }
        links:
          type: object
          additionalProperties: { type: string }
    BondGovDocumentLifecycleResponse:
      type: object
      required:
        - schema
        - document_id
        - document
        - cache_status
        - extraction_status
        - docintel_status
        - ready
        - storage
        - links
      properties:
        schema: { type: object, additionalProperties: true }
        document_id: { type: string }
        document: { type: object, additionalProperties: true }
        cache_status: { type: string }
        extraction_status: { type: string }
        docintel_status: { type: object, additionalProperties: true }
        docintel_remediation: { type: object, additionalProperties: true }
        ready: { type: object, additionalProperties: true }
        storage: { type: object, additionalProperties: true }
        links:
          type: object
          additionalProperties: { type: string }
    BondGovTextResponse:
      type: object
      required: [schema, document, extraction_status, cache_status]
      properties:
        schema: { type: object, additionalProperties: true }
        document: { type: object, additionalProperties: true }
        extraction_status: { type: string }
        cache_status: { type: string }
        docintel_status: { type: object, additionalProperties: true }
        ready: { type: object, additionalProperties: true }
        counts:
          type: object
          additionalProperties: { type: integer }
        full_text: { type: string }
        sections:
          type: array
          items: { type: object, additionalProperties: true }
        tables:
          type: array
          items: { type: object, additionalProperties: true }
paths:
  /api/v1/investor-documents/auth/:
    get:
      summary: Check BondGov API authentication status
      security:
        - BondGovApiKeyAuth: []
      responses:
        "200":
          description: Authentication status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondGovApiAuthStatusResponse"
  /api/v1/investor-documents/doclist/:
    get:
      summary: Find investor documents by CUSIP9
      security:
        - BondGovApiKeyAuth: []
      parameters:
        - in: query
          name: cusip
          required: true
          schema: { type: string }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: scope
          schema:
            type: string
            enum: [all, cusip, emma_issuer, entity]
            default: all
      responses:
        "200":
          description: Grouped and flattened document records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondGovDoclistResponse"
  /api/v1/investor-documents/{id}/prepare/:
    post:
      summary: Prepare an investor document PDF and extracted text
      security:
        - BondGovApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lifecycle status after preparation request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondGovDocumentLifecycleResponse"
  /api/v1/investor-documents/{id}/status/:
    get:
      summary: Check investor document lifecycle status
      security:
        - BondGovApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lifecycle status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondGovDocumentLifecycleResponse"
  /api/v1/investor-documents/{id}/text/:
    get:
      summary: Retrieve extracted investor document text
      security:
        - BondGovApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Extracted text payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondGovTextResponse"
  /api/v1/investor-documents/{id}/download/:
    get:
      summary: Download an investor document PDF
      security:
        - BondGovApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF download.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
