# Static regression fixture derived from public Reqres API examples.
openapi: 3.0.3
info:
  title: Reqres routing fixture
  version: "1.0"
externalDocs:
  url: https://reqres.in/
components:
  schemas:
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
    Unknown:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        year:
          type: integer
paths:
  /api/users:
    get:
      parameters:
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: list users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      responses:
        "200":
          description: user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      responses:
        "204":
          description: deleted user
  /api/unknown:
    get:
      responses:
        "200":
          description: list unknown resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Unknown"
