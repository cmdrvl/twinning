# Static regression fixture derived from the Swagger Petstore OpenAPI 3 sample.
openapi: 3.0.3
info:
  title: Petstore routing fixture
  version: "1.0"
externalDocs:
  url: https://petstore3.swagger.io/api/v3/openapi.yaml
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
paths:
  /pets:
    get:
      responses:
        "200":
          description: list pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: created pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: integer
    get:
      responses:
        "200":
          description: pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: updated pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      responses:
        "204":
          description: deleted pet
