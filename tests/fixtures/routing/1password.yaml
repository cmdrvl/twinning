# Static regression fixture derived from the 1Password Connect OpenAPI 3 surface.
openapi: 3.0.3
info:
  title: 1Password Connect routing fixture
  version: "1.0"
externalDocs:
  url: https://api.apis.guru/v2/specs/1password.local/connect/1.5.7/openapi.json
components:
  schemas:
    Vault:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    Item:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
paths:
  /vaults:
    get:
      responses:
        "200":
          description: vaults
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vault"
  /vaults/{vaultUuid}:
    parameters:
      - name: vaultUuid
        in: path
        required: true
        schema:
          type: string
    get:
      responses:
        "200":
          description: vault
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vault"
  /vaults/{vaultUuid}/items:
    parameters:
      - name: vaultUuid
        in: path
        required: true
        schema:
          type: string
    get:
      responses:
        "200":
          description: items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Item"
      responses:
        "200":
          description: item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
