name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  release:
    types: ["published"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twinning
    steps:
      - uses: actions/checkout@v4
        with:
          path: twinning
      - uses: actions/checkout@v4
        with:
          repository: cmdrvl/verify
          path: verify
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            twinning -> target
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twinning
    steps:
      - uses: actions/checkout@v4
        with:
          path: twinning
      - uses: actions/checkout@v4
        with:
          repository: cmdrvl/verify
          path: verify
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            twinning -> target
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twinning
    steps:
      - uses: actions/checkout@v4
        with:
          path: twinning
      - uses: actions/checkout@v4
        with:
          repository: cmdrvl/verify
          path: verify
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            twinning -> target
      - name: Run tests
        run: cargo test

  ubs:
    name: UBS (critical-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install UBS (pinned)
        run: |
          UBS_URL="https://raw.githubusercontent.com/Dicklesworthstone/ultimate_bug_scanner/4320d660b376758d764467e1d29b18dec03db31e/ubs"
          UBS_SHA256="88c126334769c0422ee71781c8ebf340af99aa3d307ab3c03a207118aff5547e"
          curl -fsSL "$UBS_URL" -o /tmp/ubs
          echo "$UBS_SHA256  /tmp/ubs" | sha256sum -c -
          install -m 0755 /tmp/ubs /usr/local/bin/ubs
          ubs --version
      - name: Run UBS critical-only gate (Rust scoped)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            ./scripts/ubs_gate.sh src
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "$base" "$GITHUB_SHA")
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed files for UBS."
            exit 0
          fi

          ./scripts/ubs_gate.sh "${changed_files[@]}"
      - name: Upload UBS summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubs-gate-summary
          path: .ubs-gate-summary.json
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: twinning
    steps:
      - uses: actions/checkout@v4
        with:
          path: twinning
      - uses: actions/checkout@v4
        with:
          repository: cmdrvl/verify
          path: verify
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            twinning -> target
      - name: Build release
        run: cargo build --release --locked
      - name: Smoke test binary
        run: |
          if [ "$RUNNER_OS" != "Windows" ]; then
            ./target/release/twinning --describe
          else
            ./target/release/twinning.exe --describe
          fi
        shell: bash

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, ubs, build]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ]]; then
            echo "Format job failed"
            exit 1
          fi
          if [[ "${{ needs.clippy.result }}" != "success" ]]; then
            echo "Clippy job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          if [[ "${{ needs.ubs.result }}" != "success" ]]; then
            echo "UBS job failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" && "${{ needs.build.result }}" != "skipped" ]]; then
            echo "Build job failed"
            exit 1
          fi
          echo "All CI jobs passed successfully!"
