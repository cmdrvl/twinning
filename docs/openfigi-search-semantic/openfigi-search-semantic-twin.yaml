openapi: 3.0.3
info:
  title: OpenFIGI /search semantic twin overlay (measured 2026-06-10)
  version: 2.0.0
  description: 'Overlay of the official OpenFIGI schema (sha256:d83fbc4ad3053c23684ec9c9b24e667d61ef1022e1d98456252f8cba3159d520)
    with x-twinning response stubs encoding measured /search semantics: error envelopes at HTTP 200, identifier
    routing, relevance recipes, silent enum no-match, deterministic pagination.'
servers:
- url: https://api.openfigi.com/{basePath}
  variables:
    basePath:
      default: v3
      enum:
      - v3
      - v2
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: X-OPENFIGI-APIKEY
      in: header
  schemas:
    SearchRequest:
      type: object
      properties:
        query:
          type: string
        start:
          type: string
        exchCode:
          type: string
        securityType:
          type: string
        marketSecDes:
          type: string
    SearchEnvelope:
      type: object
      description: 'Measured top-level shape: a single object, not the array the published spec declares.
        error/data/next are mutually present per case; all arrive with HTTP status 200.'
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        next:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
paths:
  /search:
    post:
      security:
      - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: All measured /search outcomes, including validation errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchEnvelope'
